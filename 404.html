<!DOCTYPE html>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #f9f9f9; color: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }

        a { display: inline-block; padding: 15px 36px; background: linear-gradient(45deg, #FF0000, #CC0000); color: #fff; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; border-radius: 10px; text-decoration: none; text-transform: uppercase; letter-spacing: 0.8px; transition: all 0.35s ease; }
        a:hover { transform: scale(1.04); box-shadow: 0 6px 32px rgba(255, 0, 0, 0.45); }
    </style>
    <script type="application/ld+json">
    {

                "@type": "Organization",

                "hasOfferCatalog": {
                    "@type": "OfferCatalog",
                    "name": "Nos services",
                    "itemListElement": [
                        {
                            "@type": "Offer",
                            "itemOffered": {

                                "name": "page introuvable",
